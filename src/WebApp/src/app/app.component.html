<div class="main-container d-flex flex-column">
  <app-topbar (rationSelected)="onRationSelected($event)" [id]="id" />

  <div class="content mt-4">
    <app-basalration />
  </div>
  <div class="content mt-4">
    <app-energy-food />
  </div>


  <div class="content mt-4">
    <ul class="nav nav-tabs" id="tabs" role="tablist">

      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="norms-tab" data-bs-toggle="tab" data-bs-target="#norms" type="button"
          role="tab" aria-controls="norms" aria-selected="true">
          Analyse
        </button>
      </li>


      <li class="nav-item" role="presentation">
        <button class="nav-link" id="cows-tab" data-bs-toggle="tab" data-bs-target="#cows" type="button" role="tab"
          aria-controls="cows" aria-selected="false">
          Alle koeien
        </button>
      </li>
    </ul>
    <div class="tab-content" id="tabsContent">
      <div class="tab-pane fade show active" id="norms" role="tabpanel" aria-labelledby="norms-tab">
        <div class="content mt-2">
          <app-cows-overview [tableId]='"norms-table"' [isAllCows]="false"></app-cows-overview>
        </div>
      </div>

      <div class="tab-pane fade" id="cows" role="tabpanel" aria-labelledby="cows-tab">
        <div class="content mt-2">
          <app-cows-overview [tableId]='"cows-table"' [isAllCows]="true"></app-cows-overview>
        </div>
      </div>
    </div>
  </div>
</div>
