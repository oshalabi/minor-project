<button
  class="btn btn-primary"
  data-bs-toggle="modal"
  data-bs-target="#livestock-properties-modal"
  (click)="$event.stopPropagation()"
>
  Veestapel kenmerken
</button>

<div
  class="modal fade"
  id="livestock-properties-modal"
  tabindex="-1"
  aria-labelledby="livestockPropertiesModalLabel"
  aria-hidden="true"
  (click)="$event.stopPropagation()"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <!-- Modal Header -->
      <div class="modal-header">
        <h5 class="modal-title" id="livestockPropertiesModalLabel">
          Veestapel kenmerken
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs" id="tabNavigation" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="general-livestock-properties-tab"
              data-bs-toggle="tab"
              data-bs-target="#general-livestock-properties"
              type="button"
              role="tab"
              aria-controls="general-livestock-properties"
              aria-selected="true"
            >
              Algemeen
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="details-livestock-properties-tab"
              data-bs-toggle="tab"
              data-bs-target="#details-livestock-properties"
              type="button"
              role="tab"
              aria-controls="details-livestock-properties"
              aria-selected="false"
            >
              Details
            </button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content mt-3">
          <!-- General Livestock Properties -->
          <div
            class="tab-pane fade show active"
            id="general-livestock-properties"
            role="tabpanel"
            aria-labelledby="general-livestock-properties-tab"
          >
            <div class="row g-3">
              <!-- Production Section -->
              <div class="col-md-6">
                <h6 class="mb-2">Productie</h6>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="productionLevel"
                    placeholder="Productie niveau"
                    [(ngModel)] = "livestockProperties.productionLevel"
                  />
                  <label for="productionLevel">Productie niveau</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="netto"
                    placeholder="Netto opbrengst"
                    [(ngModel)] = "livestockProperties.netto"
                  />
                  <label for="netto">Netto opbrengst</label>
                </div>
                <div class="input-group mb-3">
                  <div class="form-floating">
                    <input
                      type="number"
                      class="form-control"
                      id="milkFat"
                      placeholder="Vet%"
                      [(ngModel)] = "livestockProperties.milkFat"
                    />
                    <label for="milkFat">Vet</label>
                  </div>
                  <span class="input-group-text" id="basic-addon2">%</span>
                </div>
                <div class="input-group mb-3">
                  <div class="form-floating">
                    <input
                      type="number"
                      class="form-control"
                      id="milkProtein"
                      placeholder="Eiwit%"
                      [(ngModel)] = "livestockProperties.milkProtein"
                    />
                    <label for="milkProtein">Eiwit</label>
                  </div>
                  <span class="input-group-text" id="basic-addon2">%</span>
                </div>
              </div>

              <!-- Livestock Count Section -->
              <div class="col-md-6">
                <h6 class="mb-2">Aantal dieren</h6>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="totalCows"
                    placeholder="Totaal"
                    [(ngModel)] = "livestockProperties.totalCows"
                  />
                  <label for="totalCows">Totaal</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="oldCows"
                    placeholder="Oudere koeien"
                    [(ngModel)] = "livestockProperties.oldCows"
                  />
                  <label for="oldCows">Oudere koeien</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="secondCalves"
                    placeholder="2e kalfs"
                    [(ngModel)] = "livestockProperties.secondCalves"
                  />
                  <label for="secondCalves">2e kalfs</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="heiffers"
                    placeholder="Vaarzen"
                    [(ngModel)] = "livestockProperties.heiffers"
                  />
                  <label for="heiffers">Vaarzen</label>
                </div>
              </div>
            </div>
          </div>

          <!-- Details Livestock Properties -->
          <div
            class="tab-pane fade"
            id="details-livestock-properties"
            role="tabpanel"
            aria-labelledby="details-livestock-properties-tab"
          >
            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="calvingAge"
                    placeholder="Tussenkalftijd"
                    [(ngModel)] = "livestockProperties.calvingAge"
                  />
                  <label for="calvingAge">Tussenkalftijd</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="avgLactationDays"
                    placeholder="Gem. lactatiedagen"
                    [(ngModel)] = "livestockProperties.avgLactationDays"
                  />
                  <label for="avgLactationDays">Gem. lactatiedagen</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="input-group mb-3">
                  <div class="form-floating">
                    <input
                      type="number"
                      class="form-control"
                      id="avgWeightCow"
                      placeholder="Gem. gewicht koe"
                      aria-describedby="basic-addon2"
                      [(ngModel)] = "livestockProperties.avgWeightCow"
                    />
                    <label for="avgWeightCow">Gem. gewicht koe</label>
                  </div>
                  <span class="input-group-text" id="basic-addon2">KG</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Sluiten
        </button>
        <button
          type="button"
          class="btn btn-danger"
          (click)="confirm()"
          data-bs-dismiss="modal"
        >
          Bevestigen
        </button>
      </div>
    </div>
  </div>
</div>
