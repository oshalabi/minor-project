<button
  class="btn btn"
  data-bs-toggle="modal"
  data-bs-target="#energyFoodModal"
  onclick="event.stopPropagation()"
>
  Tabel
</button>

<div
  class="modal fade"
  id="energyFoodModal"
  tabindex="-1"
  aria-labelledby="energyFoodModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content wide-modal">
      <div class="modal-header">
        <h3 class="modal-title" id="energyFoodModalLabel">Krachtvoer</h3>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <!-- Tabs Navigation -->
        <ul class="nav nav-tabs" id="tabNavigation" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="tabel-tab"
              data-bs-toggle="tab"
              data-bs-target="#tabel-content"
              type="button"
              role="tab"
              aria-controls="tabel-content"
              aria-selected="true"
            >
              Tabel
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="graph-tab"
              data-bs-toggle="tab"
              data-bs-target="#grafiek-content"
              type="button"
              role="tab"
              aria-controls="grafiek-content"
              aria-selected="false"
            >
              Grafiek
            </button>
          </li>
        </ul>

        <!-- Tabs Content -->
        <div class="tab-content mt-3">
          <!-- Tabel Content -->
          <div
            class="tab-pane fade show active"
            id="tabel-content"
            role="tabpanel"
            aria-labelledby="tabel-tab"
          >
            <p>Hier komt de inhoud van de tabel.</p>
          </div>
          <!-- Grafiek Content -->
          <div
            class="tab-pane fade"
            id="grafiek-content"
            role="tabpanel"
            aria-labelledby="graph-tab"
          >
            <app-graph-content />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Sluiten
        </button>
      </div>
    </div>
  </div>
</div>
