<div class="modal fade" id="{{modalId}}" tabindex="-1" aria-labelledby="removeFeedTypeModalLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <!-- Modal Header -->
      <div class="modal-header">
        <h5 class="modal-title" id="removeFeedTypeModalLabel">{{ header }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        Are you sure you want to delete <strong>{{ modalObject.feedTypeName }}</strong>?
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-danger" (click)="confirm()" data-bs-dismiss="modal">
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>
